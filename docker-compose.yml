services:
  postgres:
    image: postgres:16-alpine
    container_name: paycollection-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: paycollection
      POSTGRES_PASSWORD: paycollection
      POSTGRES_DB: paycollection
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - paycollection_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paycollection -d paycollection"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  paycollection_pg_data:
