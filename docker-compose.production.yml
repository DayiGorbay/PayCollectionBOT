name: paycollection

services:
  postgres:
    image: postgres:16-alpine
    container_name: paycollection-postgres
    restart: always
    environment:
      POSTGRES_USER: paycollection
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: paycollection
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paycollection -d paycollection"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: paycollection-backend
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://paycollection:${POSTGRES_PASSWORD}@postgres:5432/paycollection
      BOT_HEALTH_URL: http://bot:8090/health
    volumes:
      - uploads:/app/data/uploads
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: paycollection-bot
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://paycollection:${POSTGRES_PASSWORD}@postgres:5432/paycollection
      BACKEND_API_URL: http://backend:8000/api/v1
      UPLOADS_DIR: /app/data/uploads/receipts
    volumes:
      - uploads:/app/data/uploads
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8090/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: paycollection-frontend
    restart: always
    networks:
      - internal
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    container_name: paycollection-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/active.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
    networks:
      - internal
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

networks:
  internal:
    driver: bridge

volumes:
  pg_data:
  uploads:
